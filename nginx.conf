events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/css application/javascript application/json text/html;

    # ── Upstream: apps del ecosistema ──
    # ReDo corre en host (network_mode: host) en el puerto 8081
    # FiDo corre en su contenedor en el puerto 8080

    upstream redo {
        server 127.0.0.1:8081;
    }

    upstream fido {
        server fido:8080;
    }

    server {
        listen 80;
        server_name _;

        # ── Portal: HTML estático ──
        root /usr/share/nginx/html;
        index index.html;

        # ── CSS compartido (design system) ──
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1h;
        }

        # ── ReDo ──
        location /red/ {
            proxy_pass http://redo/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /red;
        }

        # ── FiDo ──
        location /finanzas/ {
            proxy_pass http://fido/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /finanzas;
        }

        # ── Portal (catch-all) ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
