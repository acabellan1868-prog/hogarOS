events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/css application/javascript application/json text/html;

    # ── Upstream: apps del ecosistema ──
    # ReDo corre en host (network_mode: host) en el puerto 8083
    #   → Desde el contenedor Nginx se llega al host via "host.docker.internal"
    # FiDo corre en su propio contenedor, accesible por nombre en la red Docker

    upstream redo {
        server host.docker.internal:8083;
    }

    upstream fido {
        server fido:8080;
    }

    upstream hogar-api {
        server hogar-api:8080;
    }

    server {
        listen 80;
        server_name _;

        # ── Portal: HTML estático ──
        root /usr/share/nginx/html;
        index index.html;

        # ── CSS compartido (design system) ──
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1h;
        }

        # ── FiDo ──
        location /finanzas/ {
            proxy_pass http://fido/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /finanzas;

            # Reescribir rutas absolutas en el HTML/JS de FiDo
            sub_filter_once off;
            sub_filter_types text/html application/javascript;
            sub_filter 'href="/' 'href="/finanzas/';
            sub_filter 'src="/' 'src="/finanzas/';
            sub_filter 'fetch("/' 'fetch("/finanzas/';
            sub_filter 'fetch(`/' 'fetch(`/finanzas/';
            sub_filter '"/api/' '"/finanzas/api/';
            sub_filter '"/static/' '"/finanzas/static/';
        }

        # ── ReDo ──  (mismo tratamiento)
        location /red/ {
            proxy_pass http://redo/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /red;

            sub_filter_once off;
            sub_filter_types text/html application/javascript;
            sub_filter 'href="/' 'href="/red/';
            sub_filter 'src="/' 'src="/red/';
            sub_filter 'fetch("/' 'fetch("/red/';
            sub_filter 'fetch(`/' 'fetch(`/red/';
            sub_filter '"/api/' '"/red/api/';
            sub_filter '"/static/' '"/red/static/';
        }

        # ── hogar-api (gestión del lanzador + backup) ──
        location /api/lanzador {
            proxy_pass http://hogar-api/lanzador;
            proxy_set_header Host $host;
            proxy_set_header Content-Type application/json;
        }

        location /api/backup {
            proxy_pass http://hogar-api/backup;
            proxy_set_header Host $host;
            proxy_set_header Content-Type application/json;
        }

        # ── Kryptonite API (crypto portfolio) ──
        location /crypto/api/ {
            proxy_pass http://host.docker.internal:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Home Assistant API (proxy con token) ──
        location /domotica/api/ {
            proxy_pass http://192.168.31.132:8123/api/;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Bearer ${HA_TOKEN}";
            proxy_set_header Content-Type application/json;
        }

        # ── Portal (catch-all) ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
