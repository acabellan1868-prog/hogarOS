services:

  # ── Portal (Nginx reverse proxy + frontend estático) ──
  nginx:
    image: nginx:alpine
    container_name: hogar-portal
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./portal:/usr/share/nginx/html:ro
    depends_on:
      - fido
    restart: unless-stopped

  # ── ReDo — Red Doméstica ──
  # Se construye desde /mnt/datos/redo-build/
  # Usa network_mode: host para escaneos ARP en la LAN
  redo:
    build: /mnt/datos/redo-build
    container_name: redo
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - /mnt/datos/redo:/app/data
    environment:
      - TZ=Europe/Madrid
      - REDO_DB_PATH=/app/data/redo.db
      - REDO_NETWORK=192.168.31.0/24
      - REDO_SCAN_INTERVAL=300
      - NTFY_TOPIC=hogaros-3ca6f61b
    restart: unless-stopped

  # ── FiDo — Finanzas Domésticas ──
  # Se construye desde /mnt/datos/fido-build/
  fido:
    build: /mnt/datos/fido-build
    container_name: fido
    ports:
      - "8080:8080"
    volumes:
      - /mnt/datos/fido:/app/data
    environment:
      - TZ=Europe/Madrid
      - FIDO_DB_PATH=/app/data/fido.db
    restart: unless-stopped
