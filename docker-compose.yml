services:

  # ── Portal (Nginx reverse proxy + frontend estático) ──
  nginx:
    image: nginx:alpine
    container_name: hogar-portal
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./portal:/usr/share/nginx/html:ro
    environment:
      - HA_TOKEN=${HA_TOKEN}
    command: /bin/sh -c "envsubst '$${HA_TOKEN}' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      - fido
      - hogar-api
      - medido
      - kryptonite
    restart: unless-stopped

  # ── hogar-api — Gestión del lanzador ──
  hogar-api:
    build: ./hogar-api
    container_name: hogar-api
    volumes:
      - /mnt/datos/hogar-api:/app/data
    environment:
      - TZ=Europe/Madrid
      - LANZADOR_JSON=/app/data/lanzador.json
    restart: unless-stopped

  # ── ReDo — Red Doméstica ──
  # Se construye desde /mnt/datos/redo-build/
  # Usa network_mode: host para escaneos ARP en la LAN
  redo:
    build: /mnt/datos/redo-build
    container_name: redo
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - /mnt/datos/redo:/app/data
    environment:
      - TZ=Europe/Madrid
      - REDO_DB_PATH=/app/data/redo.db
      - REDO_NETWORK=${REDO_NETWORK}
      - REDO_SCAN_INTERVAL=300
      - NTFY_TOPIC=${NTFY_TOPIC_ALERTAS}
    restart: unless-stopped

  # ── FiDo — Finanzas Domésticas ──
  # Se construye desde /mnt/datos/fido-build/
  fido:
    build: /mnt/datos/fido-build
    container_name: fido
    ports:
      - "8082:8080"
    volumes:
      - /mnt/datos/fido:/app/data
    environment:
      - TZ=Europe/Madrid
      - FIDO_DB_PATH=/app/data/fido.db
      - NTFY_URL=https://ntfy.sh
      - NTFY_TOPIC=${NTFY_TOPIC_FIDO}
      - NTFY_CUENTA_DEFAULT=${NTFY_CUENTA_DEFAULT:-1}
    restart: unless-stopped

  # ── Kryptonite — Análisis de portfolio crypto ──
  # Se construye desde /mnt/datos/kryptonite-build/
  kryptonite:
    build: /mnt/datos/kryptonite-build
    container_name: kryptonite
    ports:
      - "5001:5000"
    volumes:
      - /mnt/datos/kryptonite/data:/app/data
      - /mnt/datos/kryptonite/logs:/app/logs
    env_file:
      - /mnt/datos/kryptonite/parametros.env
    environment:
      - TZ=Europe/Madrid
    restart: unless-stopped

  # ── MediDo — Metricas y salud del hogar ──
  # Se construye desde /mnt/datos/medido-build/
  medido:
    build: /mnt/datos/medido-build
    container_name: medido
    ports:
      - "8084:8084"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/datos/medido:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=Europe/Madrid
      - MEDIDO_DB_PATH=/app/data/medido.db
      - PVE_HOST=${PVE_HOST}
      - PVE_NODE=${PVE_NODE}
      - PVE_TOKEN_ID=${PVE_TOKEN_ID}
      - PVE_TOKEN_SECRET=${PVE_TOKEN_SECRET}
      - PVE_VERIFY_SSL=${PVE_VERIFY_SSL:-false}
      - HA_TOKEN=${HA_TOKEN}
      - NTFY_TOPIC=${NTFY_TOPIC_ALERTAS}
    restart: unless-stopped
