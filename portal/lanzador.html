<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanzador — HogarOS</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="apple-touch-icon" href="/static/favicon.svg">
  <link rel="manifest" href="/static/site.webmanifest">
  <meta name="theme-color" content="#1a6a60">
  <link rel="stylesheet" href="/static/hogar.css">
  <style>
    .lanzador-estado {
      text-align: center;
      padding: var(--gap-3xl);
      color: var(--on-surface-variant);
      font-size: 0.9rem;
    }

    .lanzador-estado button {
      margin-left: 0.5rem;
      cursor: pointer;
      background: none;
      border: 1px solid currentColor;
      padding: 0.3rem 0.8rem;
      border-radius: var(--radio-full);
      color: inherit;
      font-family: var(--fuente-cuerpo);
      font-size: 0.8rem;
      transition: background var(--transicion);
    }

    .lanzador-estado button:hover {
      background: var(--surface-container);
    }
  </style>
</head>
<body>

  <!-- ======== EFECTO LUMINA ======== -->
  <div class="hogar-lumina"></div>

  <!-- ======== HEADER FLOTANTE ======== -->
  <header class="hogar-header">
    <div class="hogar-header__barra">
      <a href="/" class="hogar-header__marca">
        <span class="material-symbols-outlined filled hogar-header__icono-marca">bubble_chart</span>
        <div>
          <div class="hogar-header__titulo">HogarOS</div>
          <div class="hogar-header__subtitulo">El refugio del silencio</div>
        </div>
      </a>
      <button class="hogar-header__menu-btn" id="btnMenu">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </header>

  <!-- ======== DRAWER DE NAVEGACIÓN ======== -->
  <div class="hogar-drawer-overlay oculto" id="drawerOverlay"></div>
  <nav class="hogar-drawer oculto" id="drawerNav">
    <button class="hogar-drawer__cerrar" id="btnCerrarDrawer">
      <span class="material-symbols-outlined">close</span>
    </button>
    <span class="hogar-drawer__titulo">Navegacion</span>
    <a href="/" class="hogar-drawer__enlace">
      <span class="material-symbols-outlined">roofing</span>
      <span>Inicio</span>
    </a>
    <a href="/red/" class="hogar-drawer__enlace">
      <span class="material-symbols-outlined">lan</span>
      <span>Red</span>
    </a>
    <a href="/finanzas/" class="hogar-drawer__enlace">
      <span class="material-symbols-outlined">payments</span>
      <span>Finanzas</span>
    </a>
    <a href="http://192.168.31.132:8123/lovelace/0" class="hogar-drawer__enlace" target="_blank">
      <span class="material-symbols-outlined">home_iot_device</span>
      <span>Domotica</span>
    </a>
    <a href="/lanzador.html" class="hogar-drawer__enlace hogar-drawer__enlace--activo">
      <span class="material-symbols-outlined">apps</span>
      <span>Lanzador</span>
    </a>
    <div class="hogar-drawer__separador"></div>
    <button class="hogar-drawer__enlace" id="btnTema">
      <span class="material-symbols-outlined" id="iconoTema">dark_mode</span>
      <span>Cambiar tema</span>
    </button>
  </nav>

  <!-- ======== FAB GESTIONAR ======== -->
  <a href="/admin-lanzador.html" class="lanzador-fab" title="Gestionar enlaces">
    <span class="material-symbols-outlined" style="font-size:1.5rem">add</span>
  </a>

  <!-- ======== CONTENIDO ======== -->
  <main class="hogar-contenedor" id="contenido">
    <div class="lanzador-estado">
      <span class="cargando">Cargando...</span>
    </div>
  </main>

  <script>
    /* ============================================================
       Drawer de navegacion
       ============================================================ */
    var drawer = document.getElementById("drawerNav");
    var overlay = document.getElementById("drawerOverlay");

    function toggleDrawer() {
      drawer.classList.toggle("oculto");
      overlay.classList.toggle("oculto");
    }

    document.getElementById("btnMenu").addEventListener("click", toggleDrawer);
    document.getElementById("drawerOverlay").addEventListener("click", toggleDrawer);
    document.getElementById("btnCerrarDrawer").addEventListener("click", toggleDrawer);
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && !drawer.classList.contains("oculto")) toggleDrawer();
    });

    /* ============================================================
       Tema
       ============================================================ */
    (function initTema() {
      if (localStorage.getItem("hogar-tema") === "oscuro") {
        document.documentElement.setAttribute("data-tema", "oscuro");
      }
      actualizarIconoTema();
    })();

    document.getElementById("btnTema").addEventListener("click", function() {
      var oscuro = document.documentElement.getAttribute("data-tema") === "oscuro";
      if (oscuro) {
        document.documentElement.removeAttribute("data-tema");
        localStorage.setItem("hogar-tema", "claro");
      } else {
        document.documentElement.setAttribute("data-tema", "oscuro");
        localStorage.setItem("hogar-tema", "oscuro");
      }
      actualizarIconoTema();
    });

    function actualizarIconoTema() {
      var oscuro = document.documentElement.getAttribute("data-tema") === "oscuro";
      document.getElementById("iconoTema").textContent = oscuro ? "light_mode" : "dark_mode";
    }

    /* ============================================================
       Iconos Material — mapa de nombres a iconos
       (se usan como fallback cuando el enlace no tiene icono propio)
       ============================================================ */
    var ICONOS_MATERIAL = {
      "chatgpt": "forum",
      "gemini": "auto_awesome",
      "claude": "cognition",
      "grok": "psychology",
      "spotify": "music_note",
      "tailscale": "vpn_lock",
      "proxmox": "dns",
      "portainer": "dock",
      "heimdall": "dashboard",
      "home assistant": "house_with_shield",
      "nodered": "hub",
      "node-red": "hub",
      "nextcloud": "cloud",
      "jupyter": "data_exploration",
      "jupyterlab": "data_exploration",
      "n8n": "schema",
      "planka": "view_kanban",
      "dockmon": "monitor_heart",
      "fido": "payments",
      "hogaros": "roofing",
      "mldonkey": "download",
      "assistant": "house_with_shield"
    };

    /* Colores por posición para los iconos Material */
    var COLORES_ICONO = [
      "var(--primary)", "var(--secondary)", "var(--tertiary)",
      "var(--primary-dim)", "var(--secondary-dim)", "var(--tertiary-dim)"
    ];

    /* Formas orgánicas rotativas */
    var FORMAS = ["forma-organica-1", "forma-organica-2", "forma-organica-3", "forma-organica-4"];

    /* ============================================================
       Renderizado
       ============================================================ */
    function iconoHtml(enlace, idx) {
      var icono = enlace.icono;
      var forma = FORMAS[idx % FORMAS.length];
      var color = COLORES_ICONO[idx % COLORES_ICONO.length];

      // Icono de imagen (URL)
      if (icono && !icono.startsWith("emoji:")) {
        return '<div class="lanzador-blob ' + forma + '">' +
          '<img class="lanzador-blob__img" src="' + icono + '" alt="" loading="lazy">' +
          '</div>';
      }

      // Emoji
      if (icono && icono.startsWith("emoji:")) {
        return '<div class="lanzador-blob ' + forma + '">' +
          '<span style="font-size:2.25rem">' + icono.slice(6) + '</span>' +
          '</div>';
      }

      // Material Symbol (buscar por nombre del enlace)
      var nombreLower = (enlace.nombre || "").toLowerCase();
      var materialIcon = ICONOS_MATERIAL[nombreLower] || "link";

      return '<div class="lanzador-blob ' + forma + '">' +
        '<span class="material-symbols-outlined lanzador-blob__icono" style="color:' + color + '">' +
          materialIcon +
        '</span>' +
        '</div>';
    }

    function renderizar(config) {
      var contenido = document.getElementById("contenido");
      if (!config.grupos || config.grupos.length === 0) {
        contenido.innerHTML = '<div class="lanzador-estado">No hay grupos configurados. <a href="/admin-lanzador.html">Ir al admin &rarr;</a></div>';
        return;
      }

      var html = "";
      var idxGlobal = 0;
      config.grupos.forEach(function(grupo) {
        if (!grupo.enlaces || grupo.enlaces.length === 0) return;
        html += '<section class="hogar-seccion">';
        html += '<h2 class="hogar-seccion__titulo">' + grupo.titulo + '</h2>';
        html += '<div class="lanzador-grid">';
        grupo.enlaces.forEach(function(enlace) {
          var target = enlace.nueva_pestana ? ' target="_blank"' : '';
          html += '<a href="' + enlace.url + '" class="lanzador-app"' + target + '>';
          html += iconoHtml(enlace, idxGlobal);
          html += '<div>';
          html += '<div class="lanzador-nombre">' + enlace.nombre + '</div>';
          if (enlace.descripcion) {
            html += '<div class="lanzador-desc">' + enlace.descripcion + '</div>';
          }
          html += '</div></a>';
          idxGlobal++;
        });
        html += '</div></section>';
      });

      html += '<div class="hogar-linea-glow"></div>';
      contenido.innerHTML = html;
    }

    /* ============================================================
       Carga desde API
       ============================================================ */
    fetch("/api/lanzador")
      .then(function(r) { return r.json(); })
      .then(function(config) { renderizar(config); })
      .catch(function() {
        document.getElementById("contenido").innerHTML =
          '<div class="lanzador-estado">No se pudo conectar con hogar-api.' +
          '<button onclick="location.reload()">Reintentar</button></div>';
      });
  </script>

</body>
</html>
