<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanzador — HogarOS</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="apple-touch-icon" href="/static/favicon.svg">
  <link rel="manifest" href="/static/site.webmanifest">
  <meta name="theme-color" content="#1E1B2E">
  <link rel="stylesheet" href="/static/hogar.css">
  <style>
    .lanzador-seccion {
      margin-bottom: var(--gap-xl);
    }

    .lanzador-seccion__titulo {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--texto-suave);
      margin-bottom: var(--gap-md);
    }

    .lanzador-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--gap-md);
    }

    .lanzador-enlace {
      display: flex;
      align-items: center;
      gap: var(--gap-md);
      background: var(--fondo-tarjeta);
      border: 1px solid var(--borde);
      border-radius: var(--radio-sm);
      padding: var(--gap-md);
      text-decoration: none;
      color: var(--texto);
      box-shadow: var(--sombra-sm);
      transition: box-shadow var(--transicion), border-color var(--transicion);
    }

    .lanzador-enlace:hover {
      box-shadow: var(--sombra-md);
      border-color: var(--acento);
    }

    .lanzador-icono {
      width: 40px;
      height: 40px;
      border-radius: var(--radio-sm);
      background: #fff;
      box-shadow: var(--sombra-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 5px;
    }

    .lanzador-icono img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .lanzador-icono--emoji {
      background: var(--alerta-fondo);
      font-size: 1.3rem;
      padding: 0;
    }

    .lanzador-nombre {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .lanzador-desc {
      display: block;
      font-size: 0.75rem;
      color: var(--texto-suave);
      margin-top: 2px;
    }

    .lanzador-estado {
      text-align: center;
      padding: var(--gap-xl);
      color: var(--texto-suave);
      font-size: 0.9rem;
    }

@media (max-width: 600px) {
      .lanzador-grid {
        grid-template-columns: 1fr 1fr;
        gap: var(--gap-sm);
      }
    }
  </style>
</head>
<body>

  <header class="hogar-header">
    <a href="/" class="hogar-header__logo">HogarOS</a>
    <nav class="hogar-header__nav">
      <a href="/" class="hogar-header__enlace">Inicio</a>
      <a href="/red/" class="hogar-header__enlace">Red</a>
      <a href="/finanzas/" class="hogar-header__enlace">Finanzas</a>
      <a href="http://192.168.31.132:8123/lovelace/0" class="hogar-header__enlace" target="_blank">Domotica</a>
      <a href="/lanzador.html" class="hogar-header__enlace hogar-header__enlace--activo">Lanzador</a>
      <a href="/admin-lanzador.html" class="hogar-header__enlace">Gestionar</a>
      <button class="hogar-toggle-tema" id="btnTema" title="Cambiar tema">&#9790;</button>
    </nav>
  </header>

  <main class="hogar-contenedor" id="contenido">
    <div class="lanzador-estado">Cargando...</div>
  </main>

  <script>
    /* ============================================================
       Tema
       ============================================================ */
    (function initTema() {
      if (localStorage.getItem("hogar-tema") === "oscuro") {
        document.documentElement.setAttribute("data-tema", "oscuro");
      }
      actualizarIconoTema();
    })();

    document.getElementById("btnTema").addEventListener("click", function() {
      var oscuro = document.documentElement.getAttribute("data-tema") === "oscuro";
      if (oscuro) {
        document.documentElement.removeAttribute("data-tema");
        localStorage.setItem("hogar-tema", "claro");
      } else {
        document.documentElement.setAttribute("data-tema", "oscuro");
        localStorage.setItem("hogar-tema", "oscuro");
      }
      actualizarIconoTema();
    });

    function actualizarIconoTema() {
      var oscuro = document.documentElement.getAttribute("data-tema") === "oscuro";
      document.getElementById("btnTema").textContent = oscuro ? "\u2600" : "\u263E";
    }

    /* ============================================================
       Renderizado
       ============================================================ */
    function iconoHtml(icono) {
      if (!icono) {
        return '<div class="lanzador-icono lanzador-icono--emoji">&#128279;</div>';
      }
      if (icono.startsWith("emoji:")) {
        return '<div class="lanzador-icono lanzador-icono--emoji">' + icono.slice(6) + '</div>';
      }
      return '<div class="lanzador-icono"><img src="' + icono + '" alt="" loading="lazy"></div>';
    }

    function renderizar(config) {
      var contenido = document.getElementById("contenido");
      if (!config.grupos || config.grupos.length === 0) {
        contenido.innerHTML = '<div class="lanzador-estado">No hay grupos configurados. <a href="/admin-lanzador.html">Ir al admin &rarr;</a></div>';
        return;
      }

      var html = "";
      config.grupos.forEach(function(grupo) {
        if (!grupo.enlaces || grupo.enlaces.length === 0) return;
        html += '<section class="lanzador-seccion">';
        html += '<h2 class="lanzador-seccion__titulo">' + grupo.titulo + '</h2>';
        html += '<div class="lanzador-grid">';
        grupo.enlaces.forEach(function(enlace) {
          var target = enlace.nueva_pestana ? ' target="_blank"' : '';
          html += '<a href="' + enlace.url + '" class="lanzador-enlace"' + target + '>';
          html += iconoHtml(enlace.icono);
          html += '<div>';
          html += '<span class="lanzador-nombre">' + enlace.nombre + '</span>';
          if (enlace.descripcion) {
            html += '<span class="lanzador-desc">' + enlace.descripcion + '</span>';
          }
          html += '</div></a>';
        });
        html += '</div></section>';
      });

      contenido.innerHTML = html;
    }

    /* ============================================================
       Carga desde API
       ============================================================ */
    fetch("/api/lanzador")
      .then(function(r) { return r.json(); })
      .then(function(config) { renderizar(config); })
      .catch(function() {
        document.getElementById("contenido").innerHTML =
          '<div class="lanzador-estado">No se pudo conectar con hogar-api. ' +
          '<button onclick="location.reload()" style="margin-left:0.5rem;cursor:pointer;background:none;border:1px solid currentColor;padding:0.2rem 0.6rem;border-radius:4px;color:inherit">Reintentar</button></div>';
      });
  </script>

</body>
</html>
