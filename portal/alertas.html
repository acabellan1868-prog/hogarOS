<!DOCTYPE html>
<html lang="es" data-tema-cockpit="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertas — HogarOS</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="theme-color" content="#00e5c4">
  <link rel="stylesheet" href="/static/hogar.css">
  <style>
    /* ── Reset Cockpit ── */
    html { font-size: 150%; }
    @media (max-width: 1300px) { html { font-size: 125%; } }
    @media (max-width: 900px)  { html { font-size: 100%; } }

    html, body {
      margin: 0;
      background: var(--ck-bg);
      color: var(--ck-on-surface);
      font-family: var(--ck-fuente);
    }

    /* Scanlines */
    #scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
    }
    [data-tema-cockpit="light"] #scanlines {
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.015) 2px, rgba(0,0,0,0.015) 4px
      );
    }

    /* ── Wrapper ── */
    #ck-wrap { display: flex; flex-direction: column; min-height: 100vh; position: relative; }

    /* ── Header 48px ── */
    #ck-header {
      height: 48px;
      background: var(--ck-bg2);
      border-bottom: 1px solid var(--ck-line);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      flex-shrink: 0; z-index: 10; position: sticky; top: 0;
    }

    .ck-hdr-izq { display: flex; align-items: center; gap: 0.5rem; }
    .ck-hdr-der { display: flex; align-items: center; gap: 0.75rem; }

    .ck-marca-box {
      width: 24px; height: 24px; border-radius: 3px;
      border: 1px solid var(--ck-accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(0,229,196,0.3);
    }
    [data-tema-cockpit="light"] .ck-marca-box { box-shadow: none; }
    .ck-marca-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ck-accent); box-shadow: 0 0 6px var(--ck-accent);
    }
    [data-tema-cockpit="light"] .ck-marca-dot { box-shadow: none; }

    .ck-marca-txt { font-size: 0.75rem; font-weight: 700; color: var(--ck-accent); letter-spacing: 0.15em; }
    .ck-marca-txt span { color: var(--ck-on-variant); }
    .ck-marca-sub { font-size: 0.45rem; color: var(--ck-on-variant); letter-spacing: 0.12em; }
    .ck-sep { width: 1px; height: 20px; background: var(--ck-line); margin: 0 0.5rem; }

    .ck-nav { display: flex; align-items: center; gap: 0; }
    .ck-nav a {
      font-family: var(--ck-fuente);
      font-size: 0.52rem; letter-spacing: 0.12em;
      color: var(--ck-on-variant); cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-bottom: 1px solid transparent;
      text-decoration: none; transition: color 0.2s;
    }
    .ck-nav a:hover  { color: var(--ck-on-surface); }
    .ck-nav a.activo { color: var(--ck-accent); border-bottom-color: var(--ck-accent); }

    .ck-reloj { text-align: right; line-height: 1; }
    .ck-reloj__hora { font-size: 1rem; font-weight: 700; color: var(--ck-accent); letter-spacing: 0.08em; }
    .ck-reloj__fecha { font-size: 0.45rem; color: var(--ck-on-variant); letter-spacing: 0.12em; margin-top: 2px; }

    .ck-tema-btn {
      width: 28px; height: 28px; border: none; cursor: pointer;
      background: none; display: flex; align-items: center; justify-content: center;
      border-radius: 3px; color: var(--ck-on-variant); transition: background 0.2s;
    }
    .ck-tema-btn:hover { background: rgba(128,128,128,0.15); }

    .ck-menu-btn {
      background: none; border: none; cursor: pointer;
      color: var(--ck-on-variant); font-size: 1.2rem;
      display: none; align-items: center; padding: 0.25rem;
    }

    @media (max-width: 767px) {
      .ck-nav, .ck-sep, .ck-marca-sub { display: none; }
      .ck-menu-btn { display: flex; }
      .ck-reloj__hora { font-size: 0.85rem; }
      .ck-reloj__fecha { display: none; }
    }

    /* ── Main ── */
    #ck-main {
      flex: 1;
      padding: 1.25rem 1.5rem 3rem;
      position: relative; z-index: 1;
      max-width: 900px;
      width: 100%;
      box-sizing: border-box;
    }
    @media (max-width: 600px) { #ck-main { padding: 1rem 1rem 3rem; } }

    /* ── Cabecera de sección ── */
    .alt-titulo {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--ck-on-variant);
      text-transform: uppercase;
      display: flex; align-items: center; gap: 0.35rem;
      margin-bottom: 0.85rem;
    }
    .alt-titulo span { color: var(--ck-accent-dim); }

    /* ── Toolbar de filtros ── */
    .alt-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.85rem;
      align-items: center;
    }

    .alt-sep { flex: 1; }

    .alt-filtro {
      font-family: var(--ck-fuente);
      font-size: 0.45rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--ck-line);
      background: transparent;
      color: var(--ck-on-variant);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .alt-filtro:hover { color: var(--ck-on-surface); background: var(--ck-row-hover); }
    .alt-filtro--activo {
      border-color: var(--ck-accent);
      color: var(--ck-accent);
      background: rgba(0,229,196,0.06);
    }
    [data-tema-cockpit="light"] .alt-filtro--activo { background: rgba(26,106,96,0.06); }

    /* ── Contador ── */
    .alt-contador {
      font-size: 0.48rem;
      color: var(--ck-on-variant);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .alt-contador--alertas { color: var(--ck-danger); }

    /* ── Lista de alertas ── */
    .alt-lista { display: flex; flex-direction: column; gap: 0.3rem; }

    /* ── Item de alerta ── */
    .alt-item {
      display: grid;
      grid-template-columns: 3px 1fr auto;
      border: 1px solid var(--ck-line);
      background: var(--ck-bg2);
    }

    .alt-item__borde {
      background: var(--ck-on-variant);
      opacity: 0.3;
    }
    .alt-item--activa  .alt-item__borde { background: var(--ck-danger); opacity: 1; }
    .alt-item--warning .alt-item__borde { background: var(--ck-warn);   opacity: 1; }
    .alt-item--resuelta { opacity: 0.45; }

    .alt-item__cuerpo {
      padding: 0.5rem 0.65rem;
      min-width: 0;
    }

    .alt-item__cab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
    }

    .alt-item__modulo {
      font-size: 0.42rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.1rem 0.35rem;
      border: 1px solid var(--ck-line);
      background: var(--ck-bg3);
      color: var(--ck-on-variant);
      flex-shrink: 0;
    }
    .alt-item__modulo--redo   { border-color: rgba(0,229,196,0.25); color: var(--ck-accent-dim); }
    .alt-item__modulo--medido { border-color: rgba(58,232,160,0.25); color: var(--ck-success); }

    .alt-item__tipo {
      font-size: 0.42rem;
      color: var(--ck-on-variant);
      letter-spacing: 0.08em;
    }

    .alt-item__mensaje {
      font-size: 0.55rem;
      color: var(--ck-on-surface);
      line-height: 1.5;
      word-break: break-word;
    }

    .alt-item__fecha {
      font-size: 0.42rem;
      color: var(--ck-on-variant);
      margin-top: 0.2rem;
      letter-spacing: 0.06em;
    }

    .alt-item__acciones {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.4rem;
      flex-shrink: 0;
      justify-content: center;
    }

    .alt-btn {
      width: 26px; height: 26px;
      border: 1px solid var(--ck-line);
      background: transparent;
      cursor: pointer;
      font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--ck-on-variant);
      font-family: var(--ck-fuente);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .alt-btn--resolver:hover { border-color: var(--ck-success); color: var(--ck-success); background: rgba(58,232,160,0.06); }
    .alt-btn--eliminar:hover { border-color: var(--ck-danger);  color: var(--ck-danger);  background: rgba(232,84,84,0.06);  }

    /* ── Vacío y errores ── */
    .alt-vacio {
      font-size: 0.55rem;
      color: var(--ck-on-variant);
      padding: 1.5rem 0;
      letter-spacing: 0.1em;
    }

    .alt-error-modulo {
      font-size: 0.48rem;
      color: var(--ck-warn);
      padding: 0.35rem 0.65rem;
      border: 1px solid rgba(232,160,58,0.3);
      background: rgba(232,160,58,0.05);
      margin-bottom: 0.3rem;
      letter-spacing: 0.08em;
    }

    /* ── Footer 28px ── */
    #ck-footer {
      height: 28px;
      background: var(--ck-bg2);
      border-top: 1px solid var(--ck-line);
      display: flex; align-items: center;
      justify-content: flex-end;
      padding: 0 1rem;
      flex-shrink: 0; z-index: 1;
    }
    .ck-footer-ver { font-size: 0.45rem; color: var(--ck-on-variant); letter-spacing: 0.1em; }

    /* ── Drawer móvil ── */
    #ck-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: none;
    }
    #ck-drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 220px;
      background: var(--ck-bg2); border-left: 1px solid var(--ck-line);
      z-index: 201;
      transform: translateX(100%); transition: transform 0.25s ease;
      display: flex; flex-direction: column;
      padding: 1rem 0.75rem; gap: 0.1rem;
    }
    #ck-drawer.abierto { transform: translateX(0); }
    .ck-drawer-item {
      font-family: var(--ck-fuente);
      font-size: 0.7rem; letter-spacing: 0.1em;
      color: var(--ck-on-variant);
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--ck-line);
      cursor: pointer; text-decoration: none; display: block;
    }
    .ck-drawer-item.activo { color: var(--ck-accent); }
    .ck-drawer-cerrar {
      align-self: flex-end; background: none; border: none; cursor: pointer;
      color: var(--ck-on-variant); font-size: 1.1rem; margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

  <div id="scanlines" aria-hidden="true"></div>

  <!-- Drawer móvil -->
  <div id="ck-overlay"></div>
  <nav id="ck-drawer">
    <button class="ck-drawer-cerrar" id="ck-drawer-cerrar">✕</button>
    <a href="/"               class="ck-drawer-item">INICIO</a>
    <a href="/red/"           class="ck-drawer-item">RED</a>
    <a href="/finanzas/"      class="ck-drawer-item">FINANZAS</a>
    <a href="/salud/"         class="ck-drawer-item">SALUD</a>
    <a href="http://192.168.31.132:8123/lovelace/0" class="ck-drawer-item" target="_blank">DOMÓTICA</a>
    <a href="/lanzador.html"  class="ck-drawer-item">LANZADOR</a>
    <a href="/alertas.html"   class="ck-drawer-item activo">ALERTAS</a>
    <div style="margin-top:auto;padding-top:0.75rem;border-top:1px solid var(--ck-line)">
      <button id="ck-drawer-tema" class="ck-drawer-item" style="border:none;background:none;width:100%;text-align:left;cursor:pointer;display:flex;align-items:center;gap:0.5rem;border-bottom:none">
        <span id="ck-drawer-tema-ico"></span> Cambiar tema
      </button>
    </div>
  </nav>

  <div id="ck-wrap">

    <!-- ── HEADER ── -->
    <header id="ck-header">
      <div class="ck-hdr-izq">
        <a href="/" class="ck-marca-box" title="Volver al portal"><div class="ck-marca-dot"></div></a>
        <div>
          <div class="ck-marca-txt">HOGAR<span>OS</span></div>
          <div class="ck-marca-sub">ALERTAS</div>
        </div>
        <div class="ck-sep"></div>
        <nav class="ck-nav">
          <a href="/">INICIO</a>
          <a href="/red/">RED</a>
          <a href="/finanzas/">FINANZAS</a>
          <a href="/salud/">SALUD</a>
          <a href="http://192.168.31.132:8123/lovelace/0" target="_blank">DOMÓTICA</a>
          <a href="/lanzador.html">LANZADOR</a>
          <a href="/alertas.html" class="activo">ALERTAS</a>
        </nav>
      </div>
      <div class="ck-hdr-der">
        <button id="ck-tema-btn" class="ck-tema-btn" title="Cambiar tema"></button>
        <div class="ck-reloj">
          <div class="ck-reloj__hora" id="ck-hora">--:--:--</div>
          <div class="ck-reloj__fecha" id="ck-fecha"></div>
        </div>
        <button id="ck-menu-btn" class="ck-menu-btn">☰</button>
      </div>
    </header>

    <!-- ── CONTENIDO ── -->
    <main id="ck-main">

      <div class="alt-titulo">
        <span>◆</span> Centro de alertas
      </div>

      <div class="alt-toolbar" id="alertasToolbar">
        <button class="alt-filtro alt-filtro--activo" data-filtro="todas">TODAS</button>
        <button class="alt-filtro" data-filtro="activas">ACTIVAS</button>
        <button class="alt-filtro" data-filtro="resueltas">RESUELTAS</button>
        <div class="alt-sep"></div>
        <button class="alt-filtro alt-filtro--activo" data-modulo="todas">TODOS</button>
        <button class="alt-filtro" data-modulo="redo">REDO</button>
        <button class="alt-filtro" data-modulo="medido">MEDIDO</button>
      </div>

      <div class="alt-contador" id="alertasContador"></div>
      <div class="alt-lista" id="alertasLista">
        <div class="alt-vacio">Cargando alertas...</div>
      </div>

    </main>

    <!-- ── FOOTER ── -->
    <footer id="ck-footer">
      <div class="ck-footer-ver">ALERTAS · COCKPIT EDITION · AUTO-REFRESH 30s</div>
    </footer>

  </div><!-- #ck-wrap -->

  <script>
    var REDO_API   = "/red/api";
    var MEDIDO_API = "/salud/api";

    /* ============================================================
       Tema
       ============================================================ */
    (function() {
      var t = localStorage.getItem("hogar-cockpit-tema") || "dark";
      document.documentElement.setAttribute("data-tema-cockpit", t);
      setIconoTema(t);
    })();

    function toggleTema() {
      var actual = document.documentElement.getAttribute("data-tema-cockpit");
      var nuevo  = actual === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-tema-cockpit", nuevo);
      localStorage.setItem("hogar-cockpit-tema", nuevo);
      setIconoTema(nuevo);
    }

    function svgSol() {
      return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    }
    function svgLuna() {
      return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }

    function setIconoTema(tema) {
      var btn = document.getElementById("ck-tema-btn");
      if (btn) btn.innerHTML = tema === "dark" ? svgSol() : svgLuna();
      var ico = document.getElementById("ck-drawer-tema-ico");
      if (ico) ico.innerHTML = tema === "dark" ? svgSol() : svgLuna();
    }

    document.getElementById("ck-tema-btn").addEventListener("click", toggleTema);
    document.getElementById("ck-drawer-tema").addEventListener("click", toggleTema);

    /* ============================================================
       Reloj
       ============================================================ */
    function tickReloj() {
      var now  = new Date();
      var hora = now.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      var fecha = now.toLocaleDateString("es-ES", { weekday: "short", day: "2-digit", month: "short", year: "numeric" }).toUpperCase();
      document.getElementById("ck-hora").textContent  = hora;
      document.getElementById("ck-fecha").textContent = fecha;
    }
    tickReloj();
    setInterval(tickReloj, 1000);

    /* ============================================================
       Drawer móvil
       ============================================================ */
    var _overlay = document.getElementById("ck-overlay");
    var _drawer  = document.getElementById("ck-drawer");

    function abrirDrawer()  { _drawer.classList.add("abierto");    _overlay.style.display = "block"; }
    function cerrarDrawer() { _drawer.classList.remove("abierto"); _overlay.style.display = "none"; }

    document.getElementById("ck-menu-btn").addEventListener("click", abrirDrawer);
    document.getElementById("ck-drawer-cerrar").addEventListener("click", cerrarDrawer);
    _overlay.addEventListener("click", cerrarDrawer);
    document.addEventListener("keydown", function(e) { if (e.key === "Escape") cerrarDrawer(); });

    /* ============================================================
       Alertas
       ============================================================ */
    var ALERTAS_FUENTES = [
      { modulo: "redo",   api: REDO_API   + "/alertas", nombre: "ReDo"   },
      { modulo: "medido", api: MEDIDO_API + "/alertas", nombre: "MediDo" }
    ];
    var ALERTAS_API_MAP = { redo: REDO_API, medido: MEDIDO_API };

    var filtroEstado = "todas";
    var filtroModulo = "todas";
    var alertasCache = [];

    document.getElementById("alertasToolbar").addEventListener("click", function(e) {
      var btn = e.target.closest("[data-filtro]");
      if (btn) {
        filtroEstado = btn.dataset.filtro;
        document.querySelectorAll("[data-filtro]").forEach(function(b) {
          b.classList.toggle("alt-filtro--activo", b.dataset.filtro === filtroEstado);
        });
        renderizar();
        return;
      }
      btn = e.target.closest("[data-modulo]");
      if (btn) {
        filtroModulo = btn.dataset.modulo;
        document.querySelectorAll("[data-modulo]").forEach(function(b) {
          b.classList.toggle("alt-filtro--activo", b.dataset.modulo === filtroModulo);
        });
        renderizar();
      }
    });

    function cargarAlertas() {
      var promesas = ALERTAS_FUENTES.map(function(fuente) {
        return fetch(fuente.api)
          .then(function(r) { return r.json(); })
          .then(function(d) {
            return (d.alertas || []).map(function(a) {
              a.modulo        = fuente.modulo;
              a.modulo_nombre = fuente.nombre;
              return a;
            });
          })
          .catch(function() {
            return [{ _error: true, modulo: fuente.modulo, modulo_nombre: fuente.nombre }];
          });
      });

      Promise.all(promesas).then(function(resultados) {
        var todas = [], errores = [];
        resultados.forEach(function(lista) {
          lista.forEach(function(a) {
            if (a._error) errores.push(a);
            else todas.push(a);
          });
        });
        todas.sort(function(a, b) {
          if (a.resuelta !== b.resuelta) return a.resuelta - b.resuelta;
          return (b.fecha || "").localeCompare(a.fecha || "");
        });
        alertasCache = todas;
        renderizar(errores);
      });
    }

    function renderizar(errores) {
      var contenedor = document.getElementById("alertasLista");
      var contador   = document.getElementById("alertasContador");

      var filtradas = alertasCache.filter(function(a) {
        if (filtroEstado === "activas"   &&  a.resuelta) return false;
        if (filtroEstado === "resueltas" && !a.resuelta) return false;
        if (filtroModulo !== "todas" && a.modulo !== filtroModulo) return false;
        return true;
      });

      var totalActivas = alertasCache.filter(function(a) { return !a.resuelta; }).length;
      contador.className = "alt-contador" + (totalActivas > 0 ? " alt-contador--alertas" : "");
      contador.textContent = totalActivas > 0
        ? "! " + totalActivas + " ALERTA" + (totalActivas > 1 ? "S" : "") + " ACTIVA" + (totalActivas > 1 ? "S" : "")
        : "SIN ALERTAS ACTIVAS";

      var htmlErrores = "";
      if (errores && errores.length) {
        errores.forEach(function(e) {
          htmlErrores += '<div class="alt-error-modulo">SIN CONEXIÓN · ' + e.modulo_nombre + '</div>';
        });
      }

      if (!filtradas.length) {
        contenedor.innerHTML = htmlErrores + '<div class="alt-vacio">SIN ALERTAS</div>';
        return;
      }

      var html = htmlErrores;
      filtradas.forEach(function(a) {
        var esActiva  = !a.resuelta;
        var esWarning = a.tipo === "warning";
        var claseItem = "alt-item" + (a.resuelta ? " alt-item--resuelta" : (esWarning ? " alt-item--warning" : " alt-item--activa"));

        html += '<div class="' + claseItem + '">';
        html += '<div class="alt-item__borde"></div>';
        html += '<div class="alt-item__cuerpo">';
        html += '<div class="alt-item__cab">';
        html += '<span class="alt-item__modulo alt-item__modulo--' + a.modulo + '">' + a.modulo_nombre + '</span>';
        if (a.tipo) html += '<span class="alt-item__tipo">' + a.tipo.toUpperCase() + '</span>';
        html += '</div>';
        html += '<div class="alt-item__mensaje">' + a.mensaje + '</div>';
        if (a.fecha) html += '<div class="alt-item__fecha">' + formatearFecha(a.fecha) + '</div>';
        html += '</div>';

        html += '<div class="alt-item__acciones">';
        if (esActiva) {
          html += '<button class="alt-btn alt-btn--resolver" title="Resolver" onclick="resolverAlerta(\'' + a.modulo + '\',' + a.id + ')">✓</button>';
        }
        html += '<button class="alt-btn alt-btn--eliminar" title="Eliminar" onclick="eliminarAlerta(\'' + a.modulo + '\',' + a.id + ')">✕</button>';
        html += '</div>';
        html += '</div>';
      });

      contenedor.innerHTML = html;
    }

    function resolverAlerta(modulo, id) {
      var api = ALERTAS_API_MAP[modulo];
      if (!api) return;
      fetch(api + "/alertas/" + id + "/resolver", { method: "POST" })
        .then(function() { cargarAlertas(); });
    }

    function eliminarAlerta(modulo, id) {
      if (!confirm("Esta alerta se eliminará permanentemente.\n¿Estás seguro?")) return;
      var api = ALERTAS_API_MAP[modulo];
      if (!api) return;
      fetch(api + "/alertas/" + id, { method: "DELETE" })
        .then(function() { cargarAlertas(); });
    }

    function formatearFecha(iso) {
      if (!iso) return "";
      try {
        return new Date(iso).toLocaleString("es-ES", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
      } catch(e) { return iso; }
    }

    cargarAlertas();
    setInterval(cargarAlertas, 30000);
  </script>

</body>
</html>
